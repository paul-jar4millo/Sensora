<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sensora</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="/src/style.css" />
</head>

<body>
  <header id="app-header">
    <span id="app-name">SENSORA</span>
    <div id="status-badge" class="badge badge--loading">
      <span class="badge__dot"></span>
      Cargando…
    </div>
  </header>

  <main id="camera-wrap">
    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>
  </main>

  <footer id="app-footer">
    <div id="output-log" class="log"></div>
  </footer>

  <script type="module" src="/src/main.ts"></script>
</body>

</html>
