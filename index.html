<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sensora</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="/src/style.css" />
</head>

<body>
  <header id="app-header">
    <span id="app-name">SENSORA</span>
    <div id="status-badge" class="badge badge--loading">
      <span class="badge__dot"></span>
      Cargando…
    </div>
  </header>

  <main id="camera-wrap">
    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>
    
    <!-- Pantalla de inicio requerida para desbloquear audio en iOS -->
    <div id="start-screen" style="position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.8); z-index: 10;">
      <button id="start-btn" style="padding: 1rem 2rem; font-size: 1.2rem; background: var(--accent); color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">
        Activar Cámara y Audio
      </button>
    </div>
  </main>

  <footer id="app-footer">
    <div id="output-log" class="log"></div>
  </footer>

  <script type="module" src="/src/main.ts"></script>
</body>

</html>
